<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  />
  <title>CE RAG — Mobile Chat</title>
  <meta name="theme-color" content="#10b981" />
  <link rel="preconnect" href="https://cdn.tailwindcss.com" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

  <style>
    /* iOS safe-area support for sticky input/footer */
    :root {
      --sat: env(safe-area-inset-top, 0px);
      --sar: env(safe-area-inset-right, 0px);
      --sab: env(safe-area-inset-bottom, 0px);
      --sal: env(safe-area-inset-left, 0px);
    }
    .safe-bottom { padding-bottom: calc(0.5rem + var(--sab)); }
    .safe-top { padding-top: calc(0.5rem + var(--sat)); }
    .scrollbar-thin::-webkit-scrollbar { height: 6px; width: 6px; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 9999px; }
    .dark .scrollbar-thin::-webkit-scrollbar-thumb { background: #475569; }
    .prose pre code { white-space: pre; }
  </style>
</head>

<body class="h-dvh flex flex-col bg-white text-gray-900 dark:bg-gray-900 dark:text-gray-100">
  <!-- App bar -->
  <header
    class="safe-top sticky top-0 z-20 border-b border-gray-200 dark:border-gray-800 bg-white/90 dark:bg-gray-900/80 backdrop-blur"
    role="banner"
  >
    <div class="max-w-3xl mx-auto px-4 py-3 flex items-center gap-3">
      <button id="menuBtn" class="p-2 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-800 lg:hidden" aria-label="Open menu">
        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>
      <div class="flex-1">
        <h1 class="text-base font-semibold leading-tight">CE RAG</h1>
        <p id="status" class="text-xs text-gray-500">Ready</p>
      </div>
      <button id="newChatBtn" class="px-3 py-2 text-sm rounded-xl bg-gray-100 hover:bg-gray-200 dark:bg-gray-800 dark:hover:bg-gray-700">New</button>
      <button id="settingsBtn" class="p-2 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-800" aria-label="Open settings">
        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
      </button>
    </div>
  </header>

  <main class="flex-1 flex flex-col min-h-0">
    <!-- Messages -->
    <div id="messages" class="flex-1 overflow-y-auto px-3 sm:px-4 pt-4 pb-2 scrollbar-thin">
      <!-- Welcome -->
      <div id="welcome" class="max-w-md mx-auto text-center py-10">
        <h2 class="text-2xl font-semibold mb-2">Ask CE RAG</h2>
        <p class="text-sm text-gray-500 mb-6">Courses, prerequisites, planning, careers — in Thai or English.</p>

        <div class="grid gap-2 text-left">
          <button class="example rounded-xl border border-gray-200 dark:border-gray-700 px-4 py-3 hover:bg-gray-50 dark:hover:bg-gray-800">
            <div class="text-sm font-medium">Course requirements</div>
            <div class="text-xs text-gray-500">What is the prerequisite for Advanced Digital Design?</div>
          </button>
          <button class="example rounded-xl border border-gray-200 dark:border-gray-700 px-4 py-3 hover:bg-gray-50 dark:hover:bg-gray-800">
            <div class="text-sm font-medium">Career guidance</div>
            <div class="text-xs text-gray-500">What career paths are available for CE graduates?</div>
          </button>
          <button class="example rounded-xl border border-gray-200 dark:border-gray-700 px-4 py-3 hover:bg-gray-50 dark:hover:bg-gray-800">
            <div class="text-sm font-medium">Course planning</div>
            <div class="text-xs text-gray-500">Help me plan my course sequence if I want to study Cybersecurity.</div>
          </button>
        </div>
      </div>

      <!-- Container for live/chat messages -->
      <div id="thread" class="max-w-3xl mx-auto hidden"></div>
    </div>

    <!-- Composer - Fixed at bottom -->
    <div class="flex-shrink-0 safe-bottom border-t border-gray-200 dark:border-gray-800 px-3 sm:px-4 pb-3 pt-2 bg-white/95 dark:bg-gray-900/90 backdrop-blur">
      <form id="composer" class="max-w-3xl mx-auto">
        <div class="flex items-end gap-2">
          <style>
            #input::-webkit-scrollbar {
              display: none;
            }
            #input {
              -ms-overflow-style: none; 
              scrollbar-width: none;     
            }
          </style>
          <textarea
            id="input"
            rows="1"
            placeholder="Message CE RAG…"
            maxlength="1000"
            class="-webkit-scrollbar::-webkit-scrollbar-none flex-1 resize-none rounded-2xl border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-800 px-4 py-3 pr-10 leading-relaxed placeholder:text-gray-500 focus:outline-none focus:ring-2 focus:ring-brand-200 dark:focus:ring-brand-800"
            aria-label="Chat input"
          ></textarea>
          <button
            id="send"
            type="submit"
            class="shrink-0 p-3 rounded-2xl bg-gray-200 text-gray-600 hover:bg-brand-500 hover:text-white disabled:opacity-50 disabled:cursor-not-allowed dark:bg-gray-800 dark:text-gray-400 dark:hover:bg-brand-600"
            disabled
            aria-label="Send message"
          >
            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
            </svg>
          </button>
        </div>
        <div class="mt-2 flex items-center justify-between text-[11px] text-gray-500">
          <span><span id="count">0</span>/1000</span>
          <span>CE RAG can make mistakes. Check important info.</span>
        </div>
      </form>
    </div>
  </main>

  <!-- Settings Modal -->
  <div id="settingsModal" class="fixed inset-0 z-30 hidden">
    <div class="absolute inset-0 bg-black/50"></div>
    <div class="relative mx-auto max-w-md px-4 h-full grid place-items-center">
      <div class="w-full rounded-2xl bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 p-5">
        <div class="flex items-center justify-between mb-4">
          <h3 class="text-base font-semibold">Settings</h3>
          <button id="closeSettings" class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800" aria-label="Close settings">
            ✕
          </button>
        </div>
        <div class="space-y-4">
          <label class="block">
            <span class="text-sm">Number of sources</span>
            <select id="settingsTopK" class="mt-1 w-full rounded-xl border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-800 px-3 py-2">
              <option value="5">5</option>
              <option value="10" selected>10</option>
              <option value="20">20</option>
            </select>
          </label>
          <label class="block">
            <span class="text-sm">Language</span>
            <select id="settingsLanguage" class="mt-1 w-full rounded-xl border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-800 px-3 py-2">
              <option value="auto">Auto-detect</option>
              <option value="en">English</option>
              <option value="th">Thai</option>
            </select>
          </label>
          <label class="inline-flex items-center gap-2">
            <input id="settingsReranking" type="checkbox" class="w-4 h-4" checked />
            <span class="text-sm">Use intelligent reranking</span>
          </label>
          <label class="inline-flex items-center gap-2">
            <input id="settingsIncludeSources" type="checkbox" class="w-4 h-4" checked />
            <span class="text-sm">Include source references</span>
          </label>
          <button id="clearChatBtn" class="w-full mt-2 rounded-xl bg-red-500 text-white py-2 hover:bg-red-600">Clear chat history</button>
        </div>
      </div>
    </div>
  </div>

  <script defer src="static/app.js"></script>
</body>
</html>
