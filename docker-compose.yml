services:
  rag-api:
    build: .
    image: ce-gpt
    container_name: ce-gpt
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - API_RELOAD=true
      - EMBEDDING_MODEL=google/embeddinggemma-300m
      - OLLAMA_URL=http://host.docker.internal:11434
      - QDRANT_COLLECTION_NAME=CE-GPT
    volumes:
      - .:/app
      - ./data:/app/data
      - ./cache:/app/cache
      - ./logs:/app/logs
    restart: unless-stopped
